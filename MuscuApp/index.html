<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dako">
<meta name="theme-color" content="#070707">
<meta name="description" content="Dako — suivi d'entraînement musculation : séances, progression, records.">
<title>Dako</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icons/icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="./app.css">
</head>
<body>

<div id="splash">
  <div class="splogo"><span>D</span><i></i></div>
  <div class="spname">DAKO</div>
  <div class="sptag">TRAINING</div>
</div>

<div id="app"></div>

<div id="timerbar">
  <div id="tleft" class="num">3:00</div>
  <div id="tlabel">Repos</div>
  <button class="tact" id="tplus">+30s</button>
  <button class="tact" id="tskip">Passer</button>
</div>

<nav id="tabbar">
  <button class="tabbtn on" data-v="home">
    <svg viewBox="0 0 24 24"><path d="M4 9v6M8 6v12M16 6v12M20 9v6M8 12h8"/></svg>
    <span>Entraîner</span>
  </button>
  <button class="tabbtn" data-v="programs">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18M8 4v16"/></svg>
    <span>Programmes</span>
  </button>
  <button class="tabbtn" data-v="history">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
    <span>Historique</span>
  </button>
  <button class="tabbtn" data-v="stats">
    <svg viewBox="0 0 24 24"><path d="M4 19V11M10 19V5M16 19v-9M22 19H2"/></svg>
    <span>Stats</span>
  </button>
</nav>

<div id="overlay"></div>
<div id="sheet"></div>
<div id="toast"></div>

<script src="./bodymap.js" defer></script>
<script src="./app.js" defer></script>
</body>
</html>
